name: BunkerMac
options:
  bundleIdPrefix: com.bunker
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  BunkerMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: ../Bunker/Models
      - path: ../Bunker/Services
      - path: ../Bunker/ViewModels
      - path: ../Bunker/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bunker.macos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        INFOPLIST_KEY_CFBundleDisplayName: "BunkerMac"
        INFOPLIST_KEY_NSMainNibFile: ""
        INFOPLIST_KEY_NSPrincipalClass: "NSApplication"
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: AppKit.framework
      - sdk: NaturalLanguage.framework
      - sdk: UserNotifications.framework
