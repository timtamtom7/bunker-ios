name: Bunker
options:
  bundleIdPrefix: com.bunker
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Bunker uses your calendar to add decision deadlines as events."

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.16.0"

targets:
  Bunker:
    type: application
    platform: iOS
    sources:
      - path: Bunker
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bunker.app
        INFOPLIST_KEY_CFBundleDisplayName: Bunker
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: SQLite
        product: SQLite
      - framework: EventKit.framework
        embed: false

  BunkerMac:
    type: application
    platform: macOS
    sources:
      - path: BunkerMac/Sources
      - path: Bunker/Models
      - path: Bunker/Services/DatabaseService.swift
      - path: Bunker/Services/AIDecisionService.swift
      - path: Bunker/Services/AIAnalysisService.swift
      - path: Bunker/Services/DecisionRoomService.swift
      - path: BunkerMac/MacServices
      - path: Bunker/ViewModels
      - path: Bunker/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bunker.macos
        INFOPLIST_KEY_CFBundleDisplayName: BunkerMac
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: AppKit.framework
      - sdk: NaturalLanguage.framework
      - sdk: UserNotifications.framework
      - package: SQLite
        product: SQLite
